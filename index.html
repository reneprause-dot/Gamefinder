<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#050508" />
  <meta name="description" content="GameFinder – Suche nach Spieletipps, Cheats, Videos, Walkthroughs & Mods für alle Gaming-Plattformen" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css" />

  <title>GameFinder – Dein Gaming-Portal</title>
</head>
<body>

<div class="app-wrap">

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header class="site-header">
    <div class="logo-row">
      <span class="logo-icon">🎮</span>
      <h1 class="logo-text">GAMEFINDER</h1>
    </div>
    <p class="logo-sub">Tipps · Cheats · Videos · Walkthroughs · Downloads</p>
  </header>

  <!-- ── Search Card ────────────────────────────────────────────────────── -->
  <section class="search-card">

    <!-- Platform Selection -->
    <div class="platform-row">
      <div class="select-wrap">
        <label class="select-label" for="manufacturer-select">Hersteller</label>
        <select id="manufacturer-select" aria-label="Hersteller auswählen">
          <option value="">— Hersteller wählen —</option>
        </select>
      </div>
      <div class="select-wrap">
        <label class="select-label" for="platform-select">Plattform</label>
        <select id="platform-select" disabled aria-label="Plattform auswählen">
          <option value="">— erst Hersteller wählen —</option>
        </select>
      </div>
    </div>

    <!-- Game Search -->
    <div class="search-wrapper">
      <div class="search-input-row">
        <div class="search-input-wrap">
          <span class="search-icon">🕹️</span>
          <input
            id="game-input"
            type="text"
            placeholder="Spieltitel eingeben…"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
            aria-label="Spieltitel suchen"
            aria-autocomplete="list"
            aria-controls="suggestions"
          />
        </div>
        <button id="search-btn" aria-label="Suchen">SUCHEN</button>
      </div>

      <!-- Autocomplete Dropdown -->
      <div id="suggestions" role="listbox" aria-label="Spielvorschläge"></div>
    </div>

  </section>

  <!-- ── Game Info Banner ───────────────────────────────────────────────── -->
  <div id="game-info" role="region" aria-label="Spielinformationen"></div>

  <!-- ── Results Panel ─────────────────────────────────────────────────── -->
  <section id="results-panel" role="region" aria-label="Suchergebnisse">
    <div id="category-tabs" role="tablist" aria-label="Kategorien"></div>
    <div id="results-content"></div>
  </section>

  <!-- ── Database Management ───────────────────────────────────────────── -->
  <section class="db-section" aria-label="Spieldatenbank">
    <div class="db-info">
      <div class="db-title">💾 Lokale Spieldatenbank</div>
      <div id="db-status">Prüfe Datenbank…</div>
      <div id="last-updated"></div>
    </div>
    <button id="update-db-btn">🔄 Datenbank aktualisieren</button>
  </section>

  <!-- ── Footer ────────────────────────────────────────────────────────── -->
  <footer class="site-footer">
    <p>GameFinder &copy; 2025 · Powered by <a href="https://rawg.io" style="color:var(--cyan);text-decoration:none;">RAWG.io API</a></p>
  </footer>

</div><!-- /app-wrap -->

<!-- Scripts -->
<script src="js/platforms.js"></script>
<script src="js/app.js"></script>

</body>
</html>
